[tool.ruff]
# Базові налаштування
line-length = 88
indent-width = 4
target-version = "py39"

# Ігнорування директорій, які містять автозгенерований або кешований код
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "env",
    "__pycache__",
    "themix.db",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E501"] # Ignore line length errors
fixable = ["ALL"]

# У тестових файлах та файлі seed_db дозволено використання assert та жорстких паролів/ідентифікаторів
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402"]
"tests/*" = ["S101"]
"seed_db.py" = ["T201"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.9"
# Увімкнення суворого режиму для максимальної надійності
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
# Дозволити ігнорування сторонніх бібліотек, які не мають stub-файлів (файлів з типами)
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Зниження строгості для тестів, де гнучкість важливіша за суворі типи
module = "tests.*"
disallow_untyped_defs = false
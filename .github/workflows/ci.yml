name: Project CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  code-quality:
    name: Lint, Format, and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-requests

      - name: Run Ruff Linter
        # Формат 'github' дозволяє відображати помилки безпосередньо у коді PR як коментарі
        run: ruff check --output-format=github .

      - name: Run Ruff Formatter Check
        # Режим '--check' завершується помилкою, якщо код не відформатовано
        run: ruff format --check.

      - name: Run Static Type Checker (Mypy)
        run: mypy.

  unit-tests:
    name: Run Pytest
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Execute Tests
        run: pytest tests/
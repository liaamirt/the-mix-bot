#.pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      # Запуск Ruff у режимі лінтингу з автоматичним виправленням
      - id: ruff
        args: [ --fix ]
      # Запуск Ruff у режимі форматування (замінює Black)
      - id: ruff-format

